<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Memory Game - Pure JS Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="settings-screen" class="main-card">
            <h1>Memory Game</h1>
            <div class="settings-container">
                <h2>Settings</h2>
                
                <p class="label">Category:</p>
                <div class="options-group" id="category-select">
                    <label><input type="radio" name="category" value="abstract" checked> <span>abstract</span></label>
                    <label><input type="radio" name="category" value="people"> <span>people</span></label>
                    <label><input type="radio" name="category" value="animals"> <span>animals</span></label>
                    <label><input type="radio" name="category" value="nature"> <span>nature</span></label>
                </div>

                <p class="label">Amount of Cards:</p>
                <div class="counter-box">
                    <button class="circle-btn" id="minus">-</button>
                    <span id="amount-val">4</span>
                    <button class="circle-btn" id="plus">+</button>
                </div>

                <p class="label">Pace:</p>
                <div class="options-group">
                    <label><input type="radio" name="pace" value="easy" checked> <span>easy</span></label>
                    <label><input type="radio" name="pace" value="medium"> <span>medium</span></label>
                    <label><input type="radio" name="pace" value="hard"> <span>hard</span></label>
                    <label><input type="radio" name="pace" value="pro"> <span>pro</span></label>
                </div>

                <button id="start-btn">Start</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <div id="game-grid"></div>
            <button id="back-btn">Back to Menu</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
